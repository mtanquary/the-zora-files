
<style>
  .ctrl-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }
  .ctrl-row { margin-bottom: 1.1rem; }
  .ctrl-readout { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
  .streak-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.1rem; }
  .streak-row label { font-size: 12px; color: var(--color-text-secondary); cursor: pointer; }
</style>

<div style="padding: 1rem 0;">
  <div style="display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap;">

    <!-- THE CARD -->
    <div id="card" style="width: 310px; border-radius: 14px; overflow: hidden; background: #0D0F14; flex-shrink: 0;">

      <!-- Photo zone -->
      <div style="height: 250px; background: linear-gradient(180deg, #060c1a 0%, #0d1e42 22%, #2a1208 55%, #a03c08 78%, #E8520A 90%, #F0A500 100%); position: relative; overflow: hidden;">

        <!-- Streak bar -->
        <div id="streak-bar" style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#F0A500 0%,#FAC75A 50%,#F0A500 100%);display:none;z-index:3;"></div>

        <!-- Location — top left -->
        <div style="padding: 14px 14px 0; position:relative; z-index:2; display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <div style="font-family: var(--font-mono); font-size: 10px; color: #C8D4E0; letter-spacing: 0.06em;">Lost Dutchman SP</div>
            <div style="font-family: var(--font-mono); font-size: 9px; color: rgba(200,212,224,0.4); margin-top: 2px;">March 21, 2026</div>
          </div>

          <!-- Emblem — floats directly over photo -->
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <canvas id="emblem-canvas" width="200" height="200" style="width:80px;height:80px;display:block;filter:drop-shadow(0 1px 6px rgba(0,0,0,0.9)) drop-shadow(0 0 12px rgba(0,0,0,0.6));"></canvas>

          </div>
        </div>

        <!-- Bottom fade -->
        <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(transparent,#0D0F14);z-index:1;"></div>
      </div>

      <!-- Score zone -->
      <div style="padding: 14px 16px 8px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <div id="eos-num" style="font-family:var(--font-mono);font-size:54px;font-weight:700;color:#1D9E75;line-height:1;letter-spacing:-0.02em;">78</div>
          <div style="font-family:var(--font-mono);font-size:7px;color:#1D9E75;letter-spacing:0.2em;margin-top:4px;">eos index</div>
        </div>
        <div style="text-align:right;padding-bottom:6px;">
          <div id="effort-gems" style="display:flex;gap:5px;justify-content:flex-end;margin-bottom:6px;"></div>
          <div id="effort-label" style="font-family:var(--font-mono);font-size:8px;color:#8A9AAE;letter-spacing:0.15em;">Trail</div>
        </div>
      </div>

      <!-- Stats strip -->
      <div style="border-top:1px solid rgba(200,212,224,0.07);padding:9px 16px;display:flex;justify-content:space-between;">
        <div style="text-align:center;">
          <div style="font-family:var(--font-mono);font-size:10px;color:#C8D4E0;">2,400 ft</div>
          <div style="font-size:7px;color:#4a5a6a;letter-spacing:0.08em;margin-top:2px;">elevation</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:var(--font-mono);font-size:10px;color:#C8D4E0;">18 mi</div>
          <div style="font-size:7px;color:#4a5a6a;letter-spacing:0.08em;margin-top:2px;">distance</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:var(--font-mono);font-size:10px;color:#C8D4E0;">:50 early</div>
          <div style="font-size:7px;color:#4a5a6a;letter-spacing:0.08em;margin-top:2px;">pre-dawn</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:var(--font-mono);font-size:10px;color:#C8D4E0;">wind</div>
          <div style="font-size:7px;color:#4a5a6a;letter-spacing:0.08em;margin-top:2px;">conditions</div>
        </div>
      </div>

      <!-- Footer -->
      <div style="padding:7px 16px 11px;">
        <div style="font-family:var(--font-mono);font-size:7px;color:rgba(200,212,224,0.2);letter-spacing:0.14em;">the zora files</div>
      </div>
    </div>

    <!-- Controls -->
    <div style="flex:1;min-width:180px;padding-top:2px;">

      <div class="ctrl-row">
        <span class="ctrl-label">Eos Index score</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="range" id="eos-slider" min="0" max="100" value="78" style="flex:1;">
          <span id="eos-readout" style="font-size:13px;font-weight:500;min-width:26px;color:#1D9E75;font-family:var(--font-mono);">78</span>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">Effort level</span>
        <input type="range" id="effort-slider" min="1" max="5" step="1" value="3" style="width:100%;">
        <div id="effort-readout" class="ctrl-readout">Trail · 3 of 5</div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">Player level (currently earning)</span>
        <select id="level-select" style="width:100%;font-size:13px;">
          <option value="0" selected>0 — Scout</option>
          <option value="1">1 — Trailhead</option>
          <option value="2">2 — Desert Fox</option>
          <option value="3">3 — Dawnchaser</option>
          <option value="4">4 — First Light</option>
          <option value="5">5 — Horizon Hunter</option>
          <option value="6">6 — Zora Seeker</option>
          <option value="7">7 — Dawn Keeper</option>
          <option value="8">8 — Eos Adept</option>
          <option value="9">9 — Zora Master</option>
          <option value="10">10 — Finding Zora</option>
        </select>
      </div>

      <div class="streak-row">
        <input type="checkbox" id="streak-check">
        <label for="streak-check">Streak earned (all 6 within 6 weeks)</label>
      </div>


    </div>
  </div>
</div>

<script>
const levelNames = ['Scout','Trailhead','Desert Fox','Dawnchaser','First Light','Horizon Hunter','Zora Seeker','Dawn Keeper','Eos Adept','Zora Master','Finding Zora'];
const effortLabels = ['','Roadside','Trail','Summit','Remote','Expedition'];

// Metal accent colors per level — used for placeholder emblem glow/tint
const levelAccent = [
  '#A0A0B0', // 0 Scout — pewter
  '#C07838', // 1 Trailhead — copper
  '#CFA04A', // 2 Desert Fox — bronze
  '#C8A030', // 3 Dawnchaser — antique gold
  '#C08080', // 4 First Light — rose gold
  '#9AA0A8', // 5 Horizon Hunter — silver
  '#B0B8C0', // 6 Zora Seeker — platinum
  '#786818', // 7 Dawn Keeper — oxidized gold
  '#388058', // 8 Eos Adept — verdigris
  '#505058', // 9 Zora Master — blackened silver
  '#D8D0C0', // 10 Finding Zora — white gold
];
const gemColors = [
  null,
  'rgba(230,175,185,0.95)', // rose quartz
  '#F0A500',                 // amber topaz
  '#E8C030',                 // citrine
  '#E86020',                 // fire opal
  '#50C8C0',                 // aquamarine
  '#9060C8',                 // amethyst
  '#C01830',                 // deep ruby
  '#1D9E75',                 // teal tourmaline
  'rgba(215,218,240,0.95)',  // moonstone
  'rgba(238,248,255,0.98)',  // diamond
];

// ── Sundog SVG ──
function sundog(filled, size) {
  size = size || 13;
  const h = Math.round(size * 1.35);
  const fill = filled ? '#F0A500' : 'rgba(240,165,0,0.15)';
  const stroke = filled ? '#FAC75A' : 'rgba(240,165,0,0.3)';
  const hw = Math.round(size / 2), hh = Math.round(h / 2);
  return `<svg width="${size}" height="${h}" viewBox="0 0 ${size} ${h}" style="display:block;"><polygon points="${hw},0 ${size},${hh} ${hw},${h} 0,${hh}" fill="${fill}" stroke="${stroke}" stroke-width="0.5"/></svg>`;
}

// ── Draw Scout compass rose (emblem only, no coin) ──
function drawCompassEmblem(ctx, S) {
  const CX = S/2, CY = S/2;
  // Subtle background glow — helps legibility over photo
  const glow = ctx.createRadialGradient(CX,CY,0,CX,CY,S*.42);
  glow.addColorStop(0,'rgba(160,160,180,0.18)');
  glow.addColorStop(1,'rgba(160,160,180,0)');
  ctx.beginPath(); ctx.arc(CX,CY,S*.42,0,Math.PI*2);
  ctx.fillStyle=glow; ctx.fill();

  const os = S * 0.00498; // scale factor: original 520px → S
  const bx=CX, by=CY;
  ctx.save();

  // Intermediate points (NE/SE/SW/NW)
  const interLen=32, interW=7;
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2+Math.PI/4, co=Math.cos(a), si=Math.sin(a), pp=-si, py=co;
    const len=interLen*os, w=interW*os;
    ctx.beginPath(); ctx.moveTo(bx+co*len,by+si*len); ctx.lineTo(bx+pp*w,by+py*w); ctx.lineTo(bx,by); ctx.closePath();
    let g=ctx.createLinearGradient(bx,by,bx+co*len,by+si*len);
    g.addColorStop(0,'#585862'); g.addColorStop(1,'#808090'); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx+co*len,by+si*len); ctx.lineTo(bx-pp*w,by-py*w); ctx.lineTo(bx,by); ctx.closePath();
    g=ctx.createLinearGradient(bx,by,bx+co*len,by+si*len);
    g.addColorStop(0,'#484852'); g.addColorStop(1,'#707082'); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx+co*len,by+si*len); ctx.lineTo(bx+pp*w,by+py*w); ctx.lineTo(bx,by); ctx.lineTo(bx-pp*w,by-py*w); ctx.closePath();
    ctx.strokeStyle='rgba(180,180,200,0.28)'; ctx.lineWidth=S*.004; ctx.stroke();
  }

  // Cardinal points (N/E/S/W) — N tallest
  const cLen=[58,50,50,50], cW=12;
  for(let i=0;i<4;i++){
    const a=-Math.PI/2+i*Math.PI/2, co=Math.cos(a), si=Math.sin(a), pp=-si, py=co;
    const len=cLen[i]*os, w=cW*os;
    ctx.beginPath(); ctx.moveTo(bx+co*len,by+si*len); ctx.lineTo(bx+pp*w,by+py*w); ctx.lineTo(bx,by); ctx.closePath();
    let g=ctx.createLinearGradient(bx,by,bx+co*len,by+si*len);
    g.addColorStop(0,'#9898A8'); g.addColorStop(1,i===0?'#C8C8D8':'#ACACBC'); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx+co*len,by+si*len); ctx.lineTo(bx-pp*w,by-py*w); ctx.lineTo(bx,by); ctx.closePath();
    g=ctx.createLinearGradient(bx,by,bx+co*len,by+si*len);
    g.addColorStop(0,'#707080'); g.addColorStop(1,i===0?'#A8A8B8':'#9494A4'); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx+co*len,by+si*len); ctx.lineTo(bx+pp*w,by+py*w); ctx.lineTo(bx,by); ctx.lineTo(bx-pp*w,by-py*w); ctx.closePath();
    ctx.strokeStyle='rgba(210,210,228,0.32)'; ctx.lineWidth=S*.005; ctx.stroke();
  }

  // Center layers
  const cg=ctx.createRadialGradient(bx-S*.012,by-S*.012,0,bx,by,12*os);
  cg.addColorStop(0,'#D0D0E0'); cg.addColorStop(0.5,'#A0A0B0'); cg.addColorStop(1,'#686878');
  ctx.beginPath(); ctx.arc(bx,by,10*os,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='rgba(210,210,228,0.38)'; ctx.lineWidth=S*.006; ctx.stroke();
  ctx.beginPath(); ctx.arc(bx,by,5*os,0,Math.PI*2); ctx.fillStyle='#C0C0D0'; ctx.fill();
  ctx.beginPath(); ctx.arc(bx,by,2*os,0,Math.PI*2); ctx.fillStyle='#E2E2F0'; ctx.fill();

  // North indicator
  ctx.beginPath(); ctx.moveTo(bx,by-14*os); ctx.lineTo(bx-3*os,by-10*os); ctx.lineTo(bx+3*os,by-10*os);
  ctx.closePath(); ctx.fillStyle='#D8D8E8'; ctx.fill();
  ctx.restore();
}

// ── Draw placeholder emblem for levels 1–10 ──
// Clean geometric symbol in the level's metal/gem palette
function drawLevelEmblem(ctx, S, level) {
  const CX=S/2, CY=S/2;
  const accent = levelAccent[level];
  const gem = gemColors[level];

  // Outer ring — thin, metal-toned
  ctx.beginPath(); ctx.arc(CX,CY,S*.38,0,Math.PI*2);
  ctx.strokeStyle=accent+'99'; ctx.lineWidth=S*.016; ctx.stroke();

  // Subtle inner glow
  const glow=ctx.createRadialGradient(CX,CY,0,CX,CY,S*.35);
  glow.addColorStop(0,accent+'18'); glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(CX,CY,S*.35,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();

  // Horizon line — subtle
  const hy = CY + S*.06;
  ctx.beginPath(); ctx.moveTo(CX-S*.28,hy); ctx.lineTo(CX+S*.28,hy);
  ctx.strokeStyle=accent+'44'; ctx.lineWidth=S*.008; ctx.stroke();

  // Sun — sits on horizon, drawn in gem color
  if(gem){
    // Sun glow
    const sg=ctx.createRadialGradient(CX,hy,0,CX,hy,S*.18);
    sg.addColorStop(0,gem.replace('0.95','0.22').replace('0.98','0.22').replace('#','rgba(').replace(/^rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})\)/i,(m,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},0.18)`));
    // Fallback: just use a simple radial
    const sg2=ctx.createRadialGradient(CX,hy,0,CX,hy,S*.18);
    sg2.addColorStop(0,'rgba(255,255,255,0.08)'); sg2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(CX,hy,S*.18,0,Math.PI*2); ctx.fillStyle=sg2; ctx.fill();

    // Sun disc — clipped to above horizon
    ctx.save();
    ctx.beginPath(); ctx.rect(0,0,S,hy); ctx.clip();
    ctx.beginPath(); ctx.arc(CX,hy,S*.16,0,Math.PI*2);
    ctx.fillStyle=gem; ctx.fill();
    // Highlight
    const sh=ctx.createRadialGradient(CX-S*.04,hy-S*.04,0,CX,hy,S*.16);
    sh.addColorStop(0,'rgba(255,255,255,0.35)'); sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(CX,hy,S*.16,0,Math.PI*2); ctx.fillStyle=sh; ctx.fill();
    ctx.restore();
  }

  // Level number — very faint, large, centered
  ctx.save();
  ctx.font = `700 ${S*.22}px monospace`;
  ctx.fillStyle = accent + '22';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(level, CX, CY - S*.06);
  ctx.restore();
}

// ── Main draw ──
function drawEmblem(earnedLevel) {
  const canvas = document.getElementById('emblem-canvas');
  const ctx = canvas.getContext('2d');
  const S = 200;
  ctx.clearRect(0,0,S,S);
  if(earnedLevel === 0){
    drawCompassEmblem(ctx, S);
  } else {
    drawLevelEmblem(ctx, S, earnedLevel);
  }
}

// ── Update ──
function update() {
  const eos     = parseInt(document.getElementById('eos-slider').value);
  const effort  = parseInt(document.getElementById('effort-slider').value);
  const level   = parseInt(document.getElementById('level-select').value);
  const streak  = document.getElementById('streak-check').checked;

  document.getElementById('eos-num').textContent = eos;
  document.getElementById('eos-readout').textContent = eos;

  let gems = '';
  for(let i=1;i<=5;i++) gems += sundog(i<=effort,13);
  document.getElementById('effort-gems').innerHTML = gems;
  document.getElementById('effort-label').textContent = effortLabels[effort];
  document.getElementById('effort-readout').textContent = effortLabels[effort]+' · '+effort+' of 5';

  document.getElementById('streak-bar').style.display = streak ? 'block' : 'none';

  drawEmblem(level);
}

['eos-slider','effort-slider','level-select','streak-check'].forEach(function(id){
  var el = document.getElementById(id);
  el.addEventListener('input', update);
  el.addEventListener('change', update);
});

requestAnimationFrame(update);
</script>
