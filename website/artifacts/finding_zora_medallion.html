
<div style="background:#050709;border-radius:18px;padding:2rem 1.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.1rem;">
  <div style="font-family:monospace;font-size:9px;color:rgba(240,232,210,0.38);letter-spacing:0.38em;">THE ZORA FILES · LEVEL 10</div>
  <canvas id="coin" width="520" height="520" style="width:100%;max-width:380px;display:block;"></canvas>
  <div id="stLbl" style="font-family:monospace;font-size:9px;color:rgba(240,232,210,0.52);letter-spacing:0.2em;min-height:14px;text-align:center;">Empty medallion · faint Zora impression</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
    <button onclick="dReset()" style="background:rgba(240,232,210,0.12);border:1px solid rgba(240,232,210,0.28);color:rgba(240,232,210,0.82);font-family:monospace;font-size:10px;letter-spacing:0.1em;padding:6px 14px;border-radius:4px;cursor:pointer;">Reset</button>
    <button onclick="dNext()" style="background:rgba(240,232,210,0.12);border:1px solid rgba(240,232,210,0.28);color:rgba(240,232,210,0.82);font-family:monospace;font-size:10px;letter-spacing:0.1em;padding:6px 14px;border-radius:4px;cursor:pointer;">Place next gem</button>
    <button onclick="dStrk()" style="background:rgba(240,232,210,0.12);border:1px solid rgba(240,232,210,0.28);color:rgba(240,232,210,0.82);font-family:monospace;font-size:10px;letter-spacing:0.1em;padding:6px 14px;border-radius:4px;cursor:pointer;">Apply streak</button>
  </div>
  <div style="font-size:10px;color:rgba(240,232,210,0.25);font-family:monospace;letter-spacing:0.1em;">Polished white gold · Diamonds · Finding Zora</div>
</div>
<script>
const cv=document.getElementById('coin');
const c=cv.getContext('2d');
const S=520,CX=260,CY=260;
const CR=210,FR=190;
const GemR=196,GL=19,GW=12;
const ORg=174,BOr=163,BIn=148,IRg=144;
const st={g:0,done:false,streak:false,etch:0,zoraA:0.09,sg:0,gl:0,fg:-1,ft:0,singIdx:-1,singT:0,flash:0,breathT:0,streakIntense:false,rings:[]};
let aid=null;
let breathAid=null;
function anim(dur,fn){return new Promise(res=>{if(aid)cancelAnimationFrame(aid);const t0=performance.now();function tick(now){const t=Math.min((now-t0)/(dur*1000),1);fn(t);render();if(t<1){aid=requestAnimationFrame(tick);}else{aid=null;res();}}aid=requestAnimationFrame(tick);});}
const pause=ms=>new Promise(r=>setTimeout(r,ms));
const lbl=s=>document.getElementById('stLbl').textContent=s;

// ── Breathing animation loop ──
function breathLoop(now){
  st.breathT=now*0.001; // seconds
  render();
  breathAid=requestAnimationFrame(breathLoop);
}
breathAid=requestAnimationFrame(breathLoop);

// ── Web Audio sound engine ──
let actx=null;
function getAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}

function sfxClick(){
  const a=getAudio(),now=a.currentTime;
  const o1=a.createOscillator(),g1=a.createGain();
  o1.type='sine';o1.frequency.setValueAtTime(2200,now);o1.frequency.exponentialRampToValueAtTime(800,now+0.08);
  g1.gain.setValueAtTime(0.3,now);g1.gain.exponentialRampToValueAtTime(0.001,now+0.1);
  o1.connect(g1);g1.connect(a.destination);o1.start(now);o1.stop(now+0.1);
  const o2=a.createOscillator(),g2=a.createGain();
  o2.type='sine';o2.frequency.setValueAtTime(5000,now);o2.frequency.exponentialRampToValueAtTime(3200,now+0.06);
  g2.gain.setValueAtTime(0.12,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.08);
  o2.connect(g2);g2.connect(a.destination);o2.start(now);o2.stop(now+0.08);
  const o3=a.createOscillator(),g3=a.createGain();
  o3.type='sine';o3.frequency.setValueAtTime(4000,now+0.02);
  g3.gain.setValueAtTime(0.06,now+0.02);g3.gain.exponentialRampToValueAtTime(0.001,now+0.25);
  o3.connect(g3);g3.connect(a.destination);o3.start(now+0.02);o3.stop(now+0.25);
}

function sfxWhoosh(){
  const a=getAudio(),now=a.currentTime;
  const dur=0.85;
  const buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1);
  const src=a.createBufferSource();src.buffer=buf;
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.Q.setValueAtTime(0.7,now);
  lp.frequency.setValueAtTime(200,now);
  lp.frequency.linearRampToValueAtTime(800,now+0.3);
  lp.frequency.linearRampToValueAtTime(500,now+0.55);
  lp.frequency.exponentialRampToValueAtTime(150,now+dur);
  const g=a.createGain();g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(0.22,now+0.2);
  g.gain.setValueAtTime(0.22,now+0.35);
  g.gain.linearRampToValueAtTime(0.14,now+0.55);
  g.gain.exponentialRampToValueAtTime(0.001,now+dur);
  src.connect(lp);lp.connect(g);g.connect(a.destination);src.start(now);src.stop(now+dur);
  const o=a.createOscillator(),go=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(80,now);
  o.frequency.linearRampToValueAtTime(120,now+0.3);
  o.frequency.linearRampToValueAtTime(70,now+dur);
  go.gain.setValueAtTime(0,now);go.gain.linearRampToValueAtTime(0.08,now+0.15);
  go.gain.setValueAtTime(0.08,now+0.4);go.gain.exponentialRampToValueAtTime(0.001,now+dur);
  o.connect(go);go.connect(a.destination);o.start(now);o.stop(now+dur);
  const o2=a.createOscillator(),g2=a.createGain();
  o2.type='triangle';o2.frequency.setValueAtTime(220,now);
  o2.frequency.linearRampToValueAtTime(330,now+0.35);
  o2.frequency.linearRampToValueAtTime(260,now+dur);
  g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(0.03,now+0.25);
  g2.gain.exponentialRampToValueAtTime(0.001,now+dur*0.8);
  o2.connect(g2);g2.connect(a.destination);o2.start(now);o2.stop(now+dur);
}

const chimeNotes=[329.63,349.23,369.99,392.00,415.30,440.00];
function sfxChime(idx){
  const a=getAudio(),now=a.currentTime;
  const freq=chimeNotes[Math.min(idx,5)];
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq,now);
  g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.2,now+0.02);
  g.gain.exponentialRampToValueAtTime(0.08,now+0.3);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.8);
  o.connect(g);g.connect(a.destination);o.start(now);o.stop(now+0.8);
  const o2=a.createOscillator(),g2=a.createGain();
  o2.type='sine';o2.frequency.setValueAtTime(freq*2.5,now);
  g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(0.04,now+0.02);
  g2.gain.exponentialRampToValueAtTime(0.001,now+0.4);
  o2.connect(g2);g2.connect(a.destination);o2.start(now);o2.stop(now+0.4);
  const d=0.18;
  const o3=a.createOscillator(),g3=a.createGain();
  o3.type='sine';o3.frequency.setValueAtTime(freq,now+d);
  g3.gain.setValueAtTime(0,now+d);g3.gain.linearRampToValueAtTime(0.08,now+d+0.02);
  g3.gain.exponentialRampToValueAtTime(0.001,now+d+0.5);
  o3.connect(g3);g3.connect(a.destination);o3.start(now+d);o3.stop(now+d+0.5);
  const d2=0.34;
  const o4=a.createOscillator(),g4=a.createGain();
  o4.type='sine';o4.frequency.setValueAtTime(freq,now+d2);
  g4.gain.setValueAtTime(0,now+d2);g4.gain.linearRampToValueAtTime(0.03,now+d2+0.02);
  g4.gain.exponentialRampToValueAtTime(0.001,now+d2+0.35);
  o4.connect(g4);g4.connect(a.destination);o4.start(now+d2);o4.stop(now+d2+0.35);
}

// Enhanced triumph — deeper, richer, longer
function sfxTriumph(){
  const a=getAudio(),now=a.currentTime;

  // ── SUB-BASS RUMBLE — felt more than heard ──
  const osub=a.createOscillator(),gsub=a.createGain();
  osub.type='sine';osub.frequency.setValueAtTime(55,now); // A1
  gsub.gain.setValueAtTime(0,now);gsub.gain.linearRampToValueAtTime(0.2,now+0.5);
  gsub.gain.setValueAtTime(0.2,now+2.0);gsub.gain.linearRampToValueAtTime(0.12,now+3.5);
  gsub.gain.exponentialRampToValueAtTime(0.001,now+5.0);
  osub.connect(gsub);gsub.connect(a.destination);osub.start(now);osub.stop(now+5.0);

  // ── BASS FOUNDATION — A2 (110Hz) + E2 (82Hz) power fifth ──
  [110, 82.41].forEach(freq=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,now);
    g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.18,now+0.3);
    g.gain.setValueAtTime(0.18,now+2.0);g.gain.exponentialRampToValueAtTime(0.001,now+4.5);
    o.connect(g);g.connect(a.destination);o.start(now);o.stop(now+4.5);
    // Warm triangle undertone
    const o2=a.createOscillator(),g2=a.createGain();
    o2.type='triangle';o2.frequency.setValueAtTime(freq,now);
    g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(0.1,now+0.4);
    g2.gain.setValueAtTime(0.1,now+1.5);g2.gain.exponentialRampToValueAtTime(0.001,now+4.0);
    o2.connect(g2);g2.connect(a.destination);o2.start(now);o2.stop(now+4.0);
  });

  // ── RISING CHORD PROGRESSION — 8 notes, A major building to triumphant resolve ──
  // A3 → E4 → A4 → C#5 → E5 → A5 → C#6 → E6
  const notes=[220, 329.63, 440, 554.37, 659.25, 880, 1108.73, 1318.5];
  const delays=[0, 0.22, 0.44, 0.66, 0.88, 1.1, 1.32, 1.54];
  notes.forEach((freq,i)=>{
    const t=now+delays[i];
    const vol=0.16-i*0.008; // slightly quieter as we go higher
    // Main sine tone
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.06);
    g.gain.setValueAtTime(vol,t+1.2);g.gain.exponentialRampToValueAtTime(0.001,t+3.5);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+3.5);
    // Triangle warmth layer
    const o2=a.createOscillator(),g2=a.createGain();
    o2.type='triangle';o2.frequency.setValueAtTime(freq,t);
    g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(vol*0.5,t+0.08);
    g2.gain.setValueAtTime(vol*0.5,t+0.8);g2.gain.exponentialRampToValueAtTime(0.001,t+3.0);
    o2.connect(g2);g2.connect(a.destination);o2.start(t);o2.stop(t+3.0);
    // Octave harmonic shimmer
    const o3=a.createOscillator(),g3=a.createGain();
    o3.type='sine';o3.frequency.setValueAtTime(freq*2,t+0.03);
    g3.gain.setValueAtTime(0,t+0.03);g3.gain.linearRampToValueAtTime(vol*0.18,t+0.1);
    g3.gain.exponentialRampToValueAtTime(0.001,t+2.0);
    o3.connect(g3);g3.connect(a.destination);o3.start(t+0.03);o3.stop(t+2.0);
    // Fifth harmonic — adds cathedral richness
    if(i<6){
      const o4=a.createOscillator(),g4=a.createGain();
      o4.type='sine';o4.frequency.setValueAtTime(freq*1.5,t+0.05);
      g4.gain.setValueAtTime(0,t+0.05);g4.gain.linearRampToValueAtTime(vol*0.1,t+0.12);
      g4.gain.exponentialRampToValueAtTime(0.001,t+2.2);
      o4.connect(g4);g4.connect(a.destination);o4.start(t+0.05);o4.stop(t+2.2);
    }
  });

  // ── SUSTAINED POWER CHORD — kicks in after the arpeggio, holds everything together ──
  const sustain=now+1.8;
  [220, 330, 440, 660, 880].forEach(freq=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,sustain);
    g.gain.setValueAtTime(0,sustain);g.gain.linearRampToValueAtTime(0.09,sustain+0.4);
    g.gain.setValueAtTime(0.09,sustain+1.5);g.gain.exponentialRampToValueAtTime(0.001,sustain+3.5);
    o.connect(g);g.connect(a.destination);o.start(sustain);o.stop(sustain+3.5);
  });

  // ── SHIMMER WASH — wide, airy, longer ──
  const buf=a.createBuffer(1,a.sampleRate*4,a.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1);
  const src=a.createBufferSource();src.buffer=buf;
  const filt=a.createBiquadFilter();filt.type='bandpass';
  filt.frequency.setValueAtTime(2000,now+0.6);
  filt.frequency.linearRampToValueAtTime(4000,now+2.0);
  filt.frequency.linearRampToValueAtTime(2500,now+4.0);
  filt.Q.setValueAtTime(5,now+0.6);
  const gw=a.createGain();gw.gain.setValueAtTime(0,now+0.6);
  gw.gain.linearRampToValueAtTime(0.06,now+1.4);
  gw.gain.setValueAtTime(0.06,now+2.5);
  gw.gain.exponentialRampToValueAtTime(0.001,now+4.5);
  src.connect(filt);filt.connect(gw);gw.connect(a.destination);src.start(now+0.6);src.stop(now+4.5);

  // ── HIGH BELL TONES — sparkle finale ──
  [1760, 2217.46, 2637.02].forEach((freq,i)=>{
    const t=now+2.0+i*0.15;
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.05,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+1.5);
  });
}

// Unique streak sound — celestial C major 7th chord
function sfxStreak(){
  const a=getAudio(),now=a.currentTime;
  // C major 7th: C5, E5, G5, B5
  const notes=[523.25,659.25,783.99,987.77];
  notes.forEach((freq,i)=>{
    const t=now+i*0.15;
    const o=a.createOscillator(),g=a.createGain();
    o.type='triangle';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.14,t+0.1);
    g.gain.setValueAtTime(0.14,t+1.5);g.gain.exponentialRampToValueAtTime(0.001,t+3.0);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+3.0);
    // Harmonic overtone
    const o2=a.createOscillator(),g2=a.createGain();
    o2.type='sine';o2.frequency.setValueAtTime(freq*2,t+0.05);
    g2.gain.setValueAtTime(0,t+0.05);g2.gain.linearRampToValueAtTime(0.04,t+0.15);
    g2.gain.exponentialRampToValueAtTime(0.001,t+2.0);
    o2.connect(g2);g2.connect(a.destination);o2.start(t+0.05);o2.stop(t+2.0);
  });
  // High sparkle overtones
  [1568,2093,2637].forEach((freq,i)=>{
    const t=now+0.5+i*0.2;
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.05,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.8);
  });
  // Sustained pad
  [523.25,783.99].forEach(freq=>{
    const t=now+0.6;
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.5);
    g.gain.setValueAtTime(0.06,t+2.0);g.gain.exponentialRampToValueAtTime(0.001,t+3.0);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+3.0);
  });
}

// ── Render ──
function render(){
  c.clearRect(0,0,S,S);
  // Draw medallion recall rings
  drawRecallRings();
  if(st.streak)drawStreakCrown(st.sg);
  drawShadow();drawRim();drawFace();
  drawBreathingSweep();
  drawRingLines();drawBand();drawHorizon();
  drawSlots();
  drawZora(st.done ? st.zoraA : Math.max(0.07, st.zoraA));
  if(st.done)drawEtch(st.etch);
  drawGems();
  if(st.gl>0)drawGlisten(st.gl);
  if(st.flash>0)drawFlash(st.flash);
  drawEdge();
}

// ── Streak Crown — Prismatic ──
function drawStreakCrown(glow){
  const innerR=CR+6,outerLong=CR+36,outerShort=CR+20,N=36;
  c.save();
  c.beginPath();c.arc(CX,CY,innerR,0,Math.PI*2);
  c.strokeStyle=`rgba(240,232,210,${0.55+glow*0.4})`;c.lineWidth=2.2;c.stroke();
  for(let i=0;i<N;i++){
    const a=i/N*Math.PI*2,big=i%3===0,tip=big?outerLong:outerShort;
    // Prismatic: each ray gets a different hue shifting over time
    const hue=(i/N*360+st.breathT*20)%360;
    const sat=big?'80%':'60%';
    const light=big?'75%':'65%';
    const alpha=(big?0.9:0.54)+glow*0.3;
    c.beginPath();c.moveTo(CX+Math.cos(a)*innerR,CY+Math.sin(a)*innerR);
    c.lineTo(CX+Math.cos(a)*tip,CY+Math.sin(a)*tip);
    c.strokeStyle=`hsla(${hue},${sat},${light},${alpha})`;c.lineWidth=big?1.8:0.9;c.stroke();
  }
  for(let i=0;i<N;i+=3){
    const a=i/N*Math.PI*2,tx=CX+Math.cos(a)*outerLong,ty=CY+Math.sin(a)*outerLong,pa=-Math.sin(a),pb=Math.cos(a);
    const hue=(i/N*360+st.breathT*20)%360;
    c.beginPath();c.moveTo(tx+Math.cos(a)*5,ty+Math.sin(a)*5);c.lineTo(tx+pa*2.5,ty+pb*2.5);
    c.lineTo(tx-Math.cos(a)*3,ty-Math.sin(a)*3);c.lineTo(tx-pa*2.5,ty-pb*2.5);
    c.closePath();c.fillStyle=`hsla(${hue},75%,72%,${0.82+glow*0.18})`;c.fill();
  }
  c.beginPath();c.arc(CX,CY,outerLong+3,0,Math.PI*2);
  c.strokeStyle=`rgba(240,232,210,${0.28+glow*0.25})`;c.lineWidth=0.7;c.stroke();
  if(glow>0){const gg=c.createRadialGradient(CX,CY,CR,CX,CY,CR+50);gg.addColorStop(0,`rgba(240,232,210,${glow*0.38})`);gg.addColorStop(1,'rgba(240,232,210,0)');c.beginPath();c.arc(CX,CY,CR+50,0,Math.PI*2);c.fillStyle=gg;c.fill();}
  c.restore();
}

// ── Medallion Recall Rings ──
function drawRecallRings(){
  if(st.rings.length===0)return;
  const now=performance.now();
  c.save();
  st.rings=st.rings.filter(r=>{
    const elapsed=(now-r.start)/1000;
    if(elapsed>1.5)return false;
    const t=elapsed/1.5;
    const radius=CR+t*120;
    const alpha=(1-t)*0.6;
    c.beginPath();c.arc(CX,CY,radius,0,Math.PI*2);
    c.strokeStyle=r.color.replace(')',`,${alpha})`).replace('rgb','rgba');
    c.lineWidth=3*(1-t)+1;
    c.stroke();
    return true;
  });
  c.restore();
}

function drawShadow(){c.save();c.beginPath();c.ellipse(CX+10,CY+13,CR+6,CR+4,0,0,Math.PI*2);c.fillStyle='rgba(0,0,0,0.5)';c.fill();c.restore();}

// ── White Gold Rim ──
function drawRim(){
  c.beginPath();c.arc(CX,CY,CR,0,Math.PI*2);c.fillStyle='#1A1810';c.fill();
  const g=c.createLinearGradient(CX-CR*.76,CY-CR*.76,CX+CR*.76,CY+CR*.76);
  g.addColorStop(0,'#F0EEE8');g.addColorStop(0.22,'#E0D8C8');g.addColorStop(0.52,'#B8A888');g.addColorStop(0.78,'#584828');g.addColorStop(1,'#1A1810');
  c.save();c.beginPath();c.arc(CX,CY,CR,0,Math.PI*2);c.arc(CX,CY,FR,0,Math.PI*2,true);c.clip();c.fillStyle=g;c.fillRect(0,0,S,S);c.restore();
}

// ── White Gold Face (mirror-like) ──
function drawFace(){
  const g=c.createRadialGradient(CX-65,CY-65,0,CX,CY,FR*1.1);
  g.addColorStop(0,'#F0EDE5');g.addColorStop(0.20,'#E8E2D5');g.addColorStop(0.45,'#D8D0C0');g.addColorStop(0.70,'#B8A888');g.addColorStop(0.90,'#8A7858');g.addColorStop(1,'#5A4830');
  c.beginPath();c.arc(CX,CY,FR,0,Math.PI*2);c.fillStyle=g;c.fill();
}

// ── Breathing Light Sweep ──
function drawBreathingSweep(){
  const period=8; // seconds
  const angle=((st.breathT%period)/period)*Math.PI*2;
  const sx=CX+Math.cos(angle)*FR*0.5;
  const sy=CY+Math.sin(angle)*FR*0.5;
  const intensity=st.streakIntense?0.35:0.18;
  const radius=st.streakIntense?140:100;
  c.save();c.beginPath();c.arc(CX,CY,FR,0,Math.PI*2);c.clip();
  const gr=c.createRadialGradient(sx,sy,0,sx,sy,radius);
  gr.addColorStop(0,`rgba(255,252,240,${intensity})`);
  gr.addColorStop(0.4,`rgba(248,240,220,${intensity*0.4})`);
  gr.addColorStop(1,'rgba(240,232,210,0)');
  c.fillStyle=gr;c.fillRect(0,0,S,S);
  c.restore();
}

// ── Gem Slots (octagonal for brilliant-cut diamonds) ──
function drawSlots(){
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2-Math.PI/2,gx=CX+Math.cos(a)*GemR,gy=CY+Math.sin(a)*GemR;
    drawOctagon(gx,gy,a,GL+3,GW+3);
    c.fillStyle='#0A0805';c.fill();c.strokeStyle='rgba(180,168,136,0.3)';c.lineWidth=0.6;c.stroke();
  }
}

function drawOctagon(cx,cy,rot,rl,rs){
  // 8-sided shape: alternating long/short radii to suggest brilliant cut
  c.beginPath();
  for(let i=0;i<8;i++){
    const a=rot+i/8*Math.PI*2-Math.PI/2;
    const r=(i%2===0)?rl:rs;
    const x=cx+Math.cos(a)*r;
    const y=cy+Math.sin(a)*r;
    if(i===0)c.moveTo(x,y);else c.lineTo(x,y);
  }
  c.closePath();
}

function drawRingLines(){
  [ORg,IRg].forEach(r=>{
    c.beginPath();c.arc(CX,CY,r,0,Math.PI*2);c.strokeStyle='rgba(90,72,48,0.6)';c.lineWidth=1.5;c.stroke();
    c.beginPath();c.arc(CX,CY,r-1,Math.PI*0.87,Math.PI*1.76);c.strokeStyle='rgba(240,232,210,0.18)';c.lineWidth=0.5;c.stroke();
  });
}

// ── Aurora/Prismatic Band ──
function drawBand(){
  const N=60;
  for(let i=0;i<N;i++){
    const a1=i/N*Math.PI*2,a2=(i+0.5)/N*Math.PI*2,a3=(i+1)/N*Math.PI*2;
    // Spectral color shifting over time
    const hue=(i/N*360+st.breathT*15)%360;
    const sat=55+Math.sin(a2+st.breathT*0.5)*15;
    const light=35+Math.sin(a2*3+st.breathT*0.3)*10;
    c.beginPath();c.moveTo(CX+Math.cos(a1)*BOr,CY+Math.sin(a1)*BOr);c.lineTo(CX+Math.cos(a2)*BIn,CY+Math.sin(a2)*BIn);c.lineTo(CX+Math.cos(a3)*BOr,CY+Math.sin(a3)*BOr);c.arc(CX,CY,BOr,a3,a1,true);
    c.fillStyle=`hsl(${hue},${sat}%,${light}%)`;c.fill();
  }
}

function drawHorizon(){
  const by=CY+44;c.save();c.beginPath();c.arc(CX,CY,IRg-2,0,Math.PI*2);c.clip();
  c.beginPath();c.moveTo(CX-88,by);c.lineTo(CX+88,by);c.strokeStyle='rgba(90,72,48,0.25)';c.lineWidth=0.6;c.stroke();
  c.restore();
}

// ── Etch Text ──
function drawEtch(al){
  if(al<=0)return;
  c.save();c.globalAlpha=al*0.98;
  // Helper: draw arc text with shadow for contrast on white gold
  function drawArcTextTop(text,radius,font){
    c.font=font;c.textBaseline='middle';c.textAlign='center';
    const chars=text.split('');
    const ca=0.14,tot=chars.length*ca,sa=-Math.PI/2-tot/2;
    for(let pass=0;pass<2;pass++){
      c.fillStyle=pass===0?'rgba(40,30,10,0.7)':'rgba(255,248,230,0.95)';
      const off=pass===0?0.8:0;
      chars.forEach((ch,i)=>{const a=sa+i*ca;c.save();c.translate(CX+Math.cos(a)*radius+off,CY+Math.sin(a)*radius+off);c.rotate(a+Math.PI/2);c.fillText(ch,0,0);c.restore();});
    }
  }
  function drawArcTextBottom(text,radius,font){
    c.font=font;c.textBaseline='middle';c.textAlign='center';
    const chars=text.split('');
    const ca=0.105,tot=chars.length*ca,sa=Math.PI/2+tot/2;
    for(let pass=0;pass<2;pass++){
      c.fillStyle=pass===0?'rgba(40,30,10,0.7)':'rgba(255,248,230,0.95)';
      const off=pass===0?0.8:0;
      chars.forEach((ch,i)=>{const a=sa-i*ca;c.save();c.translate(CX+Math.cos(a)*radius+off,CY+Math.sin(a)*radius+off);c.rotate(a-Math.PI/2);c.fillText(ch,0,0);c.restore();});
    }
  }
  // Top: FINDING ZORA
  const ar=IRg-10;
  drawArcTextTop('\u00B7 FINDING ZORA \u00B7',ar,'700 18px monospace');
  // Decorative dots
  [Math.PI*1.5,Math.PI,0].forEach(a=>{
    c.beginPath();c.arc(CX+Math.cos(a)*(IRg-6),CY+Math.sin(a)*(IRg-6),2.2,0,Math.PI*2);c.fillStyle='rgba(60,40,10,0.5)';c.fill();
    c.beginPath();c.arc(CX+Math.cos(a)*(IRg-6),CY+Math.sin(a)*(IRg-6),2.0,0,Math.PI*2);c.fillStyle='rgba(255,248,230,0.7)';c.fill();
  });
  // Bottom: YOU WERE THE SUNRISE
  drawArcTextBottom('YOU WERE THE SUNRISE',IRg-10,'600 14px monospace');
  c.restore();
}

// ── Zora Emblem: Bold Z made of sunrise rays ──
function drawZora(fa){
  c.save();
  c.beginPath();c.arc(CX,CY,IRg-2,0,Math.PI*2);c.clip();

  const zw=55,zh=58;
  const cx=CX,cy=CY-2;
  const strokeW=9;

  // Dark backing for contrast — darkens the face behind the Z area
  if(fa>0.05){
    c.globalAlpha=fa*0.55;
    const bg=c.createRadialGradient(cx,cy,10,cx,cy,95);
    bg.addColorStop(0,'rgba(30,20,5,0.6)');
    bg.addColorStop(0.7,'rgba(30,20,5,0.3)');
    bg.addColorStop(1,'rgba(30,20,5,0)');
    c.beginPath();c.arc(cx,cy,95,0,Math.PI*2);c.fillStyle=bg;c.fill();
  }

  if(fa>0.05){
    c.globalAlpha=fa;
    c.lineCap='round';c.lineJoin='round';

    // Shadow pass — dark outline behind Z for depth
    c.lineWidth=strokeW+4;
    c.strokeStyle='rgba(40,25,5,0.6)';
    c.beginPath();c.moveTo(cx-zw,cy-zh);c.lineTo(cx+zw,cy-zh);c.stroke();
    c.beginPath();c.moveTo(cx+zw,cy-zh);c.lineTo(cx-zw,cy+zh);c.stroke();
    c.beginPath();c.moveTo(cx-zw,cy+zh);c.lineTo(cx+zw,cy+zh);c.stroke();

    // Main Z strokes — bright white-gold with warm gradient
    const zGrad=c.createLinearGradient(cx-zw,cy-zh,cx+zw,cy+zh);
    zGrad.addColorStop(0,'#FFF8E0');zGrad.addColorStop(0.3,'#F0D878');zGrad.addColorStop(0.5,'#FFFFFF');zGrad.addColorStop(0.7,'#F0D878');zGrad.addColorStop(1,'#FFF8E0');
    c.lineWidth=strokeW;
    c.strokeStyle=zGrad;
    c.beginPath();c.moveTo(cx-zw,cy-zh);c.lineTo(cx+zw,cy-zh);c.stroke();
    c.beginPath();c.moveTo(cx+zw,cy-zh);c.lineTo(cx-zw,cy+zh);c.stroke();
    c.beginPath();c.moveTo(cx-zw,cy+zh);c.lineTo(cx+zw,cy+zh);c.stroke();

    // Inner highlight — thinner bright white core
    c.lineWidth=strokeW*0.35;
    c.strokeStyle='rgba(255,255,255,0.7)';
    c.beginPath();c.moveTo(cx-zw+2,cy-zh);c.lineTo(cx+zw-2,cy-zh);c.stroke();
    c.beginPath();c.moveTo(cx+zw-2,cy-zh);c.lineTo(cx-zw+2,cy+zh);c.stroke();
    c.beginPath();c.moveTo(cx-zw+2,cy+zh);c.lineTo(cx+zw-2,cy+zh);c.stroke();

    // Bold serif caps at Z corners
    const capR=5;
    [[cx-zw,cy-zh],[cx+zw,cy-zh],[cx-zw,cy+zh],[cx+zw,cy+zh]].forEach(([px,py])=>{
      c.beginPath();c.arc(px,py,capR,0,Math.PI*2);
      c.fillStyle='#F0D878';c.fill();
      c.strokeStyle='rgba(40,25,5,0.4)';c.lineWidth=1.5;c.stroke();
    });

    // Rays emanating from Z — thicker and more visible
    const rays=[
      // From top bar
      {ox:cx-zw*0.75,oy:cy-zh,angle:-Math.PI/2-0.35,len:38},
      {ox:cx-zw*0.25,oy:cy-zh,angle:-Math.PI/2-0.1,len:45},
      {ox:cx+zw*0.25,oy:cy-zh,angle:-Math.PI/2+0.1,len:42},
      {ox:cx+zw*0.75,oy:cy-zh,angle:-Math.PI/2+0.35,len:35},
      // From diagonal — all 4 rays fan outward to the right/upper-right
      {ox:cx+zw*0.45,oy:cy-zh*0.45,angle:-0.15,len:40},
      {ox:cx+zw*0.05,oy:cy-zh*0.1,angle:0.15,len:35},
      {ox:cx-zw*0.2,oy:cy+zh*0.2,angle:0.45,len:36},
      {ox:cx-zw*0.45,oy:cy+zh*0.5,angle:0.7,len:32},
      // From bottom bar
      {ox:cx-zw*0.75,oy:cy+zh,angle:Math.PI/2+0.35,len:34},
      {ox:cx-zw*0.25,oy:cy+zh,angle:Math.PI/2+0.1,len:40},
      {ox:cx+zw*0.25,oy:cy+zh,angle:Math.PI/2-0.1,len:38},
      {ox:cx+zw*0.75,oy:cy+zh,angle:Math.PI/2-0.35,len:30},
    ];
    rays.forEach((r,i)=>{
      const rayProgress=Math.min(1,fa*1.2);
      const thisRayT=Math.max(0,Math.min(1,(rayProgress-i/rays.length*0.3)/0.7));
      if(thisRayT<=0)return;
      const ex=r.ox+Math.cos(r.angle)*r.len*thisRayT;
      const ey=r.oy+Math.sin(r.angle)*r.len*thisRayT;
      // Shadow ray
      c.beginPath();c.moveTo(r.ox+0.8,r.oy+0.8);c.lineTo(ex+0.8,ey+0.8);
      c.strokeStyle='rgba(30,15,0,0.3)';c.lineWidth=4;c.lineCap='round';c.stroke();
      // Main ray — gradient from bright gold to transparent
      const gr=c.createLinearGradient(r.ox,r.oy,ex,ey);
      gr.addColorStop(0,'rgba(255,240,180,0.9)');
      gr.addColorStop(0.6,'rgba(240,210,120,0.5)');
      gr.addColorStop(1,'rgba(240,200,100,0)');
      c.beginPath();c.moveTo(r.ox,r.oy);c.lineTo(ex,ey);
      c.strokeStyle=gr;c.lineWidth=3;c.lineCap='round';c.stroke();
      // Bright core
      const gr2=c.createLinearGradient(r.ox,r.oy,ex,ey);
      gr2.addColorStop(0,'rgba(255,255,240,0.8)');
      gr2.addColorStop(0.4,'rgba(255,255,220,0.3)');
      gr2.addColorStop(1,'rgba(255,255,200,0)');
      c.beginPath();c.moveTo(r.ox,r.oy);c.lineTo(ex,ey);
      c.strokeStyle=gr2;c.lineWidth=1.2;c.stroke();
    });

    // Warm glow behind Z when fully revealed
    if(fa>=0.95){
      const glow=c.createRadialGradient(cx,cy,0,cx,cy,90);
      glow.addColorStop(0,'rgba(255,230,150,0.2)');
      glow.addColorStop(0.5,'rgba(240,200,100,0.08)');
      glow.addColorStop(1,'rgba(240,200,100,0)');
      c.beginPath();c.arc(cx,cy,90,0,Math.PI*2);c.fillStyle=glow;c.fill();
    }
  }

  // Ghost outline of Z — visible when faint
  const ghostAlpha=fa<=0.07?fa*1.8:Math.min(fa*0.25,0.18);
  c.globalAlpha=ghostAlpha;
  c.lineWidth=3;c.lineCap='round';
  c.strokeStyle='rgba(80,60,20,0.5)';
  c.beginPath();c.moveTo(cx-zw,cy-zh);c.lineTo(cx+zw,cy-zh);c.lineTo(cx-zw,cy+zh);c.lineTo(cx+zw,cy+zh);c.stroke();
  c.restore();
}

// ── Diamond Gems ──
function drawGems(){
  const spectralColors=[
    {r:255,g:80,b:60},   // Red
    {r:255,g:160,b:40},  // Orange
    {r:255,g:240,b:60},  // Yellow
    {r:80,g:240,b:120},  // Green
    {r:60,g:120,b:255},  // Blue
    {r:180,g:80,b:255},  // Violet
  ];
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2-Math.PI/2,gx=CX+Math.cos(a)*GemR,gy=CY+Math.sin(a)*GemR;
    const filled=(i<st.g)||(i===st.fg&&st.ft>0.1);
    let sc=1;if(i===st.fg&&st.ft>0){const t=st.ft;sc=t<0.35?t/0.35*1.28:1+(1-t)*0.28;}
    const settled=filled&&i<st.g&&i!==st.fg;
    c.save();c.translate(gx,gy);c.scale(sc,sc);c.translate(-gx,-gy);drawDiamond(gx,gy,a,filled,settled?i:-1);
    if(i===st.fg&&st.ft>0.05&&filled){const ga=Math.sin(st.ft*Math.PI)*0.55;const gr=c.createRadialGradient(gx,gy,0,gx,gy,28);gr.addColorStop(0,`rgba(255,252,240,${ga})`);gr.addColorStop(1,'rgba(240,232,210,0)');c.beginPath();c.arc(gx,gy,28,0,Math.PI*2);c.fillStyle=gr;c.fill();}
    // Singing glow — per-gem spectral color (rainbow cascade)
    if(i===st.singIdx&&st.singT>0){
      const sc2=spectralColors[i];
      const sa=Math.sin(st.singT*Math.PI)*0.7;
      const sg=c.createRadialGradient(gx,gy,0,gx,gy,32);
      sg.addColorStop(0,`rgba(${sc2.r},${sc2.g},${sc2.b},${sa})`);
      sg.addColorStop(0.5,`rgba(${sc2.r},${sc2.g},${sc2.b},${sa*0.4})`);
      sg.addColorStop(1,`rgba(${sc2.r},${sc2.g},${sc2.b},0)`);
      c.beginPath();c.arc(gx,gy,32,0,Math.PI*2);c.fillStyle=sg;c.fill();
    }
    c.restore();
  }
}

function drawDiamond(gx,gy,a,filled,colorIdx){
  // Brilliant-cut octagon
  drawOctagon(gx,gy,a,GL,GW);
  // Spectral palette for each gem position
  const gemPalette=[
    {hi:'#FFC8C0',mid:'#FF5040',dk:'#A02018',stroke:'rgba(255,120,100,0.7)'},  // Red
    {hi:'#FFE0C0',mid:'#FFA030',dk:'#A06010',stroke:'rgba(255,180,80,0.7)'},   // Orange
    {hi:'#FFFFF0',mid:'#FFE840',dk:'#A09010',stroke:'rgba(255,240,100,0.7)'},  // Yellow
    {hi:'#D0FFE0',mid:'#40E878',dk:'#108838',stroke:'rgba(100,240,150,0.7)'},  // Green
    {hi:'#D0E0FF',mid:'#4080FF',dk:'#1030A0',stroke:'rgba(100,150,255,0.7)'},  // Blue
    {hi:'#E8D0FF',mid:'#B050FF',dk:'#601890',stroke:'rgba(200,120,255,0.7)'},  // Violet
  ];
  if(filled){
    const hx=gx-Math.cos(a)*4-Math.sin(a)*2.5,hy=gy-Math.sin(a)*4+Math.cos(a)*2.5;
    const gr=c.createRadialGradient(hx,hy,0.5,gx,gy,GL*1.4);
    if(colorIdx>=0&&colorIdx<6){
      // Settled gem — spectral color
      const pal=gemPalette[colorIdx];
      gr.addColorStop(0,'#FFFFFF');
      gr.addColorStop(0.12,pal.hi);
      gr.addColorStop(0.36,pal.mid);
      gr.addColorStop(0.68,pal.dk);
      gr.addColorStop(1,pal.mid);
      c.fillStyle=gr;c.fill();
      c.strokeStyle=pal.stroke;c.lineWidth=0.8;c.stroke();
    }else{
      // Freshly placing — white diamond flash
      gr.addColorStop(0,'#FFFFFF');
      gr.addColorStop(0.15,'#F8F4FF');
      gr.addColorStop(0.35,'#E8E4F0');
      gr.addColorStop(0.55,'#D8D4E8');
      gr.addColorStop(0.8,'#C8C0D8');
      gr.addColorStop(1,'#E8E4F0');
      c.fillStyle=gr;c.fill();
      c.strokeStyle='rgba(255,255,255,0.6)';c.lineWidth=0.8;c.stroke();
    }
    // Facet line
    const co=Math.cos(a),si=Math.sin(a),ppx=-si,ppy=co;
    c.beginPath();c.moveTo(gx+co*GL*0.7,gy+si*GL*0.7);c.lineTo(gx+ppx*GW*0.32,gy+ppy*GW*0.32);c.strokeStyle='rgba(255,255,255,0.45)';c.lineWidth=0.5;c.stroke();
    // Rainbow spectral flecks (subtle, always present)
    const fleckColors=['#FF3030','#FF8800','#FFEE00','#00DD55','#0066FF','#9933FF'];
    fleckColors.forEach((fc,fi)=>{
      const fa=a+fi/6*Math.PI*2;
      const fd=GL*0.35+Math.sin(fi*1.7)*GL*0.15;
      const fx=gx+Math.cos(fa)*fd;
      const fy=gy+Math.sin(fa)*fd;
      c.beginPath();c.arc(fx,fy,1.2,0,Math.PI*2);
      c.fillStyle=fc;c.globalAlpha=colorIdx>=0?0.25:0.4;c.fill();c.globalAlpha=1;
    });
  }else{
    c.fillStyle='#0A0805';c.fill();
    c.strokeStyle='rgba(180,168,136,0.3)';c.lineWidth=0.6;c.stroke();
  }
}

function drawGlisten(t){
  const x=CX+(t-0.5)*FR*2.2,y=CY+(t-0.5)*FR*2.2;c.save();c.beginPath();c.arc(CX,CY,FR,0,Math.PI*2);c.clip();
  const al=Math.sin(t*Math.PI)*(st.done?0.5:0.32);
  const gr=c.createRadialGradient(x,y,0,x,y,130);
  gr.addColorStop(0,`rgba(255,252,245,${al})`);gr.addColorStop(0.5,`rgba(248,244,230,${al*0.3})`);gr.addColorStop(1,'rgba(240,232,210,0)');
  c.fillStyle=gr;c.fillRect(0,0,S,S);c.restore();
}

function drawFlash(alpha){
  if(alpha<=0)return;
  c.save();c.beginPath();c.arc(CX,CY,FR,0,Math.PI*2);
  c.fillStyle=`rgba(255,255,255,${alpha})`;c.fill();c.restore();
}

function drawEdge(){
  c.beginPath();c.arc(CX,CY,CR,Math.PI*0.94,Math.PI*1.73);c.strokeStyle='rgba(240,238,232,0.42)';c.lineWidth=1.4;c.stroke();
  c.beginPath();c.arc(CX,CY,CR,-0.08,Math.PI*0.88);c.strokeStyle='rgba(10,8,5,0.65)';c.lineWidth=1.6;c.stroke();
}

// ── Singing Gems — Rainbow Cascade ──
async function singGems(){
  const count=st.g;
  for(let i=0;i<count;i++){
    st.singIdx=i;
    sfxChime(i);
    await anim(0.38,t=>{st.singT=t;});
    st.singT=0;
    await pause(80);
  }
  st.singIdx=-1;st.singT=0;render();
}

// ── Actions ──
async function dReset(){
  if(aid){cancelAnimationFrame(aid);aid=null;}
  Object.assign(st,{g:0,done:false,streak:false,etch:0,zoraA:0.09,sg:0,gl:0,fg:-1,ft:0,singIdx:-1,singT:0,flash:0,streakIntense:false,rings:[]});
  lbl('Empty medallion \u00B7 faint Zora impression');render();
}

async function dNext(){
  if(aid)return;if(st.g>=6)return;
  const idx=st.g;st.fg=idx;
  sfxClick();
  await anim(0.52,t=>{st.ft=t;});st.g=idx+1;st.fg=-1;st.ft=0;
  sfxWhoosh();
  await anim(0.65,t=>{st.gl=t;});st.gl=0;render();lbl(`Gem ${st.g} of 6 placed`);
  await pause(200);
  await singGems();
  if(st.g===6){await pause(300);await runComplete();}
}

// ── 6th Gem Reveal — Movie Finale ──
async function runComplete(){
  lbl('Sixth gem set \u00B7 the medallion awakens...');
  await pause(500); // Building anticipation
  sfxTriumph();
  // 3 second reveal with flash at t=0.8
  await anim(3.0,t=>{
    st.etch=t;
    st.zoraA=t;
    // Flash at ~t=0.27 (0.8s into 3s)
    const flashT=0.27;
    if(t>=flashT&&t<=flashT+0.1){
      st.flash=0.4*Math.sin((t-flashT)/0.1*Math.PI);
    }else{
      st.flash=0;
    }
    // Enhanced glisten
    st.gl=t<0.3?t*3.3:Math.max(0,1-(t-0.3)*1.43);
  });
  st.done=true;st.etch=1;st.zoraA=1;st.gl=0;st.flash=0;render();lbl('Finding Zora medallion earned');
}

// ── Streak — The Ultimate Reward ──
async function dStrk(){
  if(aid)return;if(!st.done){lbl('Complete the level first');return;}if(st.streak)return;
  lbl('Streak bonus \u00B7 the journey remembered...');

  // Medallion Recall: 9 colored rings
  const ringColors=[
    'rgb(200,112,64)',   // Copper — Trailhead
    'rgb(184,124,46)',   // Warm bronze — Desert Fox
    'rgb(200,168,72)',   // Antique gold — Dawnchaser
    'rgb(208,152,120)',  // Rose gold — First Light
    'rgb(184,184,200)',  // Silver — Horizon Hunter
    'rgb(200,200,216)',  // Platinum — Zora Seeker
    'rgb(160,120,48)',   // Dark gold — Dawn Keeper
    'rgb(96,136,88)',    // Verdigris — Eos Adept
    'rgb(104,104,104)',  // Dark silver — Zora Master
  ];
  for(let i=0;i<9;i++){
    st.rings.push({color:ringColors[i],start:performance.now()});
    sfxChime(Math.min(i,5));
    await pause(200);
  }
  await pause(800); // let last rings fade

  st.streak=true;
  sfxStreak();
  await anim(2.5,t=>{st.sg=t<0.42?t/0.42:Math.max(0,1-(t-0.42)/0.58);});
  st.sg=0;st.streakIntense=true;render();lbl('Finding Zora \u00B7 streak crown earned \u00B7 you were the sunrise');
}

render();
</script>
