
<div style="background:#050709;border-radius:18px;padding:2rem 1.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.1rem;">
  <div style="font-family:monospace;font-size:9px;color:rgba(160,160,170,0.38);letter-spacing:0.38em;">THE ZORA FILES · LEVEL 0</div>
  <canvas id="coin" width="520" height="520" style="width:100%;max-width:380px;display:block;"></canvas>
  <div id="stLbl" style="font-family:monospace;font-size:9px;color:rgba(160,160,170,0.52);letter-spacing:0.2em;min-height:14px;text-align:center;">Scout starting token · awarded at signup</div>
  <div style="font-size:10px;color:rgba(160,160,170,0.25);font-family:monospace;letter-spacing:0.1em;">Brushed pewter · No gems · Scout</div>
</div>
<script>
const cv=document.getElementById('coin');
const c=cv.getContext('2d');
const S=520,CX=260,CY=260;
const CR=210,FR=190;
const ORg=174,BOr=163,BIn=148,IRg=144;

function render(){
  c.clearRect(0,0,S,S);
  drawShadow();drawRim();drawFace();
  drawRings();drawBand();drawHorizon();
  drawCompass(1);
  drawEtch(1);
  drawEdge();
}

function drawShadow(){c.save();c.beginPath();c.ellipse(CX+10,CY+13,CR+6,CR+4,0,0,Math.PI*2);c.fillStyle='rgba(0,0,0,0.5)';c.fill();c.restore();}

function drawRim(){
  c.beginPath();c.arc(CX,CY,CR,0,Math.PI*2);c.fillStyle='#0E0E10';c.fill();
  const g=c.createLinearGradient(CX-CR*.76,CY-CR*.76,CX+CR*.76,CY+CR*.76);
  g.addColorStop(0,'#C0C0C8');g.addColorStop(0.22,'#9898A0');g.addColorStop(0.52,'#686870');g.addColorStop(0.78,'#3A3A42');g.addColorStop(1,'#1A1A20');
  c.save();c.beginPath();c.arc(CX,CY,CR,0,Math.PI*2);c.arc(CX,CY,FR,0,Math.PI*2,true);c.clip();c.fillStyle=g;c.fillRect(0,0,S,S);c.restore();
}

function drawFace(){
  const g=c.createRadialGradient(CX-65,CY-65,0,CX,CY,FR*1.1);
  g.addColorStop(0,'#B8B8C0');g.addColorStop(0.17,'#9898A4');g.addColorStop(0.40,'#787880');g.addColorStop(0.68,'#585860');g.addColorStop(0.90,'#3A3A42');g.addColorStop(1,'#222228');
  c.beginPath();c.arc(CX,CY,FR,0,Math.PI*2);c.fillStyle=g;c.fill();
  // Brushed pewter texture — fine horizontal lines
  c.save();c.beginPath();c.arc(CX,CY,FR,0,Math.PI*2);c.clip();
  c.globalAlpha=0.06;
  for(let y=CY-FR;y<CY+FR;y+=3){
    c.beginPath();c.moveTo(CX-FR,y);c.lineTo(CX+FR,y);
    c.strokeStyle=y%6===0?'#E0E0E8':'#181820';c.lineWidth=0.5;c.stroke();
  }
  c.restore();
}

function drawRings(){
  [ORg,IRg].forEach(r=>{
    c.beginPath();c.arc(CX,CY,r,0,Math.PI*2);c.strokeStyle='rgba(18,18,22,0.92)';c.lineWidth=1.5;c.stroke();
    c.beginPath();c.arc(CX,CY,r-1,Math.PI*0.87,Math.PI*1.76);c.strokeStyle='rgba(180,180,192,0.18)';c.lineWidth=0.5;c.stroke();
  });
}

// Rope/twist band — interlocking S-curves like a braided cord
function drawBand(){
  const midR=(BOr+BIn)/2,h=(BOr-BIn)/2;
  const N=180;
  // Two intertwined strands
  for(let strand=0;strand<2;strand++){
    const phase=strand*Math.PI;
    for(let i=0;i<N;i++){
      const a=i/N*Math.PI*2;
      const wave=Math.sin(a*8+phase)*h*0.7;
      const r=midR+wave;
      const diff=Math.abs((((a+Math.PI*0.75)+Math.PI*3)%(Math.PI*2))-Math.PI)/Math.PI,lit=1-diff;
      const base=strand===0?80:68;
      const rv=Math.round(base+lit*60),gv=Math.round(base+lit*60),bv=Math.round(base+8+lit*58);
      c.beginPath();c.arc(CX+Math.cos(a)*r,CY+Math.sin(a)*r,2.2,0,Math.PI*2);
      c.fillStyle=`rgb(${rv},${gv},${bv})`;c.fill();
    }
  }
  // Crossing highlights
  for(let i=0;i<16;i++){
    const a=i/16*Math.PI*2+Math.PI/16;
    const x=CX+Math.cos(a)*midR,y=CY+Math.sin(a)*midR;
    c.beginPath();c.arc(x,y,1.5,0,Math.PI*2);
    c.fillStyle='rgba(200,200,210,0.2)';c.fill();
  }
}

function drawHorizon(){
  const by=CY+44;c.save();c.beginPath();c.arc(CX,CY,IRg-2,0,Math.PI*2);c.clip();
  c.beginPath();c.moveTo(CX-88,by);c.lineTo(CX+88,by);c.strokeStyle='rgba(80,80,90,0.28)';c.lineWidth=0.6;c.stroke();
  c.restore();
}

// Compass rose emblem — always fully visible on the Scout token
function drawCompass(fa){
  const os=1.3;
  c.save();c.globalAlpha=fa;

  // Compass rose with 4 cardinal and 4 intermediate points
  const cardLen=[58,50,50,50]; // N is tallest
  const cardW=12;
  const interLen=32;
  const interW=7;

  // Draw intermediate points first (behind cardinals)
  for(let i=0;i<4;i++){
    const a=(i*Math.PI/2)+Math.PI/4; // NE, SE, SW, NW
    const co=Math.cos(a),si=Math.sin(a);
    const px=-si,py=co;
    const len=interLen*os,w=interW*os;
    const bx=CX,by=CY-4;

    // Dark half
    c.beginPath();
    c.moveTo(bx+co*len,by+si*len);
    c.lineTo(bx+px*w,by+py*w);
    c.lineTo(bx,by);
    c.closePath();
    const ig1=c.createLinearGradient(bx,by,bx+co*len,by+si*len);
    ig1.addColorStop(0,'#606068');ig1.addColorStop(1,'#8A8A98');
    c.fillStyle=ig1;c.fill();

    // Light half
    c.beginPath();
    c.moveTo(bx+co*len,by+si*len);
    c.lineTo(bx-px*w,by-py*w);
    c.lineTo(bx,by);
    c.closePath();
    const ig2=c.createLinearGradient(bx,by,bx+co*len,by+si*len);
    ig2.addColorStop(0,'#505058');ig2.addColorStop(1,'#78788A');
    c.fillStyle=ig2;c.fill();

    c.beginPath();
    c.moveTo(bx+co*len,by+si*len);
    c.lineTo(bx+px*w,by+py*w);
    c.lineTo(bx,by);
    c.lineTo(bx-px*w,by-py*w);
    c.closePath();
    c.strokeStyle='rgba(180,180,200,0.3)';c.lineWidth=0.5;c.stroke();
  }

  // Cardinal points (N, E, S, W)
  for(let i=0;i<4;i++){
    const a=-Math.PI/2+i*Math.PI/2;
    const co=Math.cos(a),si=Math.sin(a);
    const px=-si,py=co;
    const len=cardLen[i]*os,w=cardW*os;
    const bx=CX,by=CY-4;

    // Light half
    c.beginPath();
    c.moveTo(bx+co*len,by+si*len);
    c.lineTo(bx+px*w,by+py*w);
    c.lineTo(bx,by);
    c.closePath();
    const cg1=c.createLinearGradient(bx,by,bx+co*len,by+si*len);
    cg1.addColorStop(0,'#A0A0B0');cg1.addColorStop(1,i===0?'#D0D0E0':'#B8B8C8');
    c.fillStyle=cg1;c.fill();

    // Dark half
    c.beginPath();
    c.moveTo(bx+co*len,by+si*len);
    c.lineTo(bx-px*w,by-py*w);
    c.lineTo(bx,by);
    c.closePath();
    const cg2=c.createLinearGradient(bx,by,bx+co*len,by+si*len);
    cg2.addColorStop(0,'#787888');cg2.addColorStop(1,i===0?'#B0B0C0':'#9898A8');
    c.fillStyle=cg2;c.fill();

    // Outline
    c.beginPath();
    c.moveTo(bx+co*len,by+si*len);
    c.lineTo(bx+px*w,by+py*w);
    c.lineTo(bx,by);
    c.lineTo(bx-px*w,by-py*w);
    c.closePath();
    c.strokeStyle='rgba(200,200,220,0.35)';c.lineWidth=0.7;c.stroke();
  }

  // Center circle layers
  const bx=CX,by=CY-4;
  const cg=c.createRadialGradient(bx-2,by-2,0,bx,by,12*os);
  cg.addColorStop(0,'#D0D0E0');cg.addColorStop(0.5,'#A0A0B0');cg.addColorStop(1,'#686878');
  c.beginPath();c.arc(bx,by,10*os,0,Math.PI*2);c.fillStyle=cg;c.fill();
  c.strokeStyle='rgba(200,200,220,0.4)';c.lineWidth=0.8;c.stroke();

  c.beginPath();c.arc(bx,by,5*os,0,Math.PI*2);
  c.fillStyle='#B8B8C8';c.fill();

  c.beginPath();c.arc(bx,by,2*os,0,Math.PI*2);
  c.fillStyle='#E0E0E8';c.fill();

  // North indicator — small arrowhead
  c.beginPath();
  c.moveTo(bx,by-14*os);
  c.lineTo(bx-3*os,by-10*os);
  c.lineTo(bx+3*os,by-10*os);
  c.closePath();
  c.fillStyle='#D8D8E8';c.fill();

  // Subtle glow behind compass
  const glow=c.createRadialGradient(bx,by,0,bx,by,75);
  glow.addColorStop(0,'rgba(180,180,200,0.08)');
  glow.addColorStop(1,'rgba(180,180,200,0)');
  c.beginPath();c.arc(bx,by,75,0,Math.PI*2);c.fillStyle=glow;c.fill();

  c.restore();
}

function drawEtch(al){
  if(al<=0)return;
  c.save();c.globalAlpha=al*0.95;

  // Title — top arc
  c.font='600 17px monospace';c.fillStyle='rgba(180,180,195,0.88)';c.textBaseline='middle';c.textAlign='center';
  const chars='\u00B7 SCOUT \u00B7'.split('');
  const ar=IRg-10,ca=0.15,tot=chars.length*ca,sa=-Math.PI/2-tot/2;
  chars.forEach((ch,i)=>{const a=sa+i*ca;c.save();c.translate(CX+Math.cos(a)*ar,CY+Math.sin(a)*ar);c.rotate(a+Math.PI/2);c.fillText(ch,0,0);c.restore();});

  // Decorative dots at cardinal points
  [Math.PI*1.5,Math.PI,0].forEach(a=>{c.beginPath();c.arc(CX+Math.cos(a)*(IRg-6),CY+Math.sin(a)*(IRg-6),1.8,0,Math.PI*2);c.fillStyle='rgba(160,160,175,0.5)';c.fill();});

  // Radial filigree lines
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2+Math.PI/8;c.beginPath();c.moveTo(CX+Math.cos(a)*76,CY+Math.sin(a)*76);c.lineTo(CX+Math.cos(a)*(94+(i%2)*18),CY+Math.sin(a)*(94+(i%2)*18));c.strokeStyle='rgba(140,140,155,0.18)';c.lineWidth=0.5;c.stroke();}

  // Bottom motto
  c.font='500 13px monospace';c.fillStyle='rgba(180,180,195,0.82)';c.textBaseline='middle';c.textAlign='center';
  const mchars='THE PATH AWAITS'.split('');
  const mr=IRg-10,mca=0.105,mtot=mchars.length*mca,msa=Math.PI/2+mtot/2;
  mchars.forEach((ch,i)=>{const a=msa-i*mca;c.save();c.translate(CX+Math.cos(a)*mr,CY+Math.sin(a)*mr);c.rotate(a-Math.PI/2);c.fillText(ch,0,0);c.restore();});

  c.restore();
}

function drawEdge(){
  c.beginPath();c.arc(CX,CY,CR,Math.PI*0.94,Math.PI*1.73);c.strokeStyle='rgba(200,200,210,0.32)';c.lineWidth=1.4;c.stroke();
  c.beginPath();c.arc(CX,CY,CR,-0.08,Math.PI*0.88);c.strokeStyle='rgba(5,5,8,0.65)';c.lineWidth=1.6;c.stroke();
}

render();
</script>
