<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }
  canvas#coin {
    display: block;
    width: 1080px;
    height: 1080px;
    background: transparent;
  }
</style>
</head>
<body>
<canvas id="coin" width="1080" height="1080"></canvas>
<script>
// ─── Canvas setup ───
// Keep all drawing code in the original 520-based coordinate system; scale the
// context so it maps 520→1080 actual pixels.
const cv = document.getElementById('coin');
const c  = cv.getContext('2d');
const SCALE = 1080 / 520;
c.scale(SCALE, SCALE);

// ─── Original constants (unchanged) ───
const S=520,CX=260,CY=260;
const CR=210,FR=190;
const GemR=196,GL=19,GW=12;
const ORg=174,BOr=163,BIn=148,IRg=144;
const st={g:0,done:false,streak:false,etch:0,foxA:0.09,sg:0,gl:0,fg:-1,ft:0,singIdx:-1,singT:0};

// ─── Original draw functions (unchanged) ───
function drawStreakCrown(glow){
  const innerR=CR+6,outerLong=CR+36,outerShort=CR+20,N=36;
  c.save();
  c.beginPath();c.arc(CX,CY,innerR,0,Math.PI*2);
  c.strokeStyle=`rgba(228,192,52,${0.55+glow*0.4})`;c.lineWidth=2.2;c.stroke();
  for(let i=0;i<N;i++){
    const a=i/N*Math.PI*2,big=i%3===0,tip=big?outerLong:outerShort;
    c.beginPath();c.moveTo(CX+Math.cos(a)*innerR,CY+Math.sin(a)*innerR);
    c.lineTo(CX+Math.cos(a)*tip,CY+Math.sin(a)*tip);
    c.strokeStyle=`rgba(228,192,52,${(big?0.9:0.54)+glow*0.3})`;c.lineWidth=big?1.8:0.9;c.stroke();
  }
  for(let i=0;i<N;i+=3){
    const a=i/N*Math.PI*2,tx=CX+Math.cos(a)*outerLong,ty=CY+Math.sin(a)*outerLong,pa=-Math.sin(a),pb=Math.cos(a);
    c.beginPath();c.moveTo(tx+Math.cos(a)*5,ty+Math.sin(a)*5);c.lineTo(tx+pa*2.5,ty+pb*2.5);
    c.lineTo(tx-Math.cos(a)*3,ty-Math.sin(a)*3);c.lineTo(tx-pa*2.5,ty-pb*2.5);
    c.closePath();c.fillStyle=`rgba(252,218,74,${0.82+glow*0.18})`;c.fill();
  }
  c.beginPath();c.arc(CX,CY,outerLong+3,0,Math.PI*2);
  c.strokeStyle=`rgba(210,170,42,${0.28+glow*0.25})`;c.lineWidth=0.7;c.stroke();
  if(glow>0){const gg=c.createRadialGradient(CX,CY,CR,CX,CY,CR+50);gg.addColorStop(0,`rgba(232,182,36,${glow*0.38})`);gg.addColorStop(1,'rgba(232,182,36,0)');c.beginPath();c.arc(CX,CY,CR+50,0,Math.PI*2);c.fillStyle=gg;c.fill();}
  c.restore();
}
function drawShadow(){c.save();c.beginPath();c.ellipse(CX+10,CY+13,CR+6,CR+4,0,0,Math.PI*2);c.fillStyle='rgba(0,0,0,0.5)';c.fill();c.restore();}
function drawRim(){
  c.beginPath();c.arc(CX,CY,CR,0,Math.PI*2);c.fillStyle='#150703';c.fill();
  const g=c.createLinearGradient(CX-CR*.76,CY-CR*.76,CX+CR*.76,CY+CR*.76);
  g.addColorStop(0,'#DCA858');g.addColorStop(0.22,'#B87C2E');g.addColorStop(0.52,'#7C4618');g.addColorStop(0.78,'#451806');g.addColorStop(1,'#150703');
  c.save();c.beginPath();c.arc(CX,CY,CR,0,Math.PI*2);c.arc(CX,CY,FR,0,Math.PI*2,true);c.clip();c.fillStyle=g;c.fillRect(0,0,S,S);c.restore();
}
function drawFace(){
  const g=c.createRadialGradient(CX-65,CY-65,0,CX,CY,FR*1.1);
  g.addColorStop(0,'#F0CA75');g.addColorStop(0.17,'#CFA04A');g.addColorStop(0.40,'#A86C2C');g.addColorStop(0.68,'#7E481A');g.addColorStop(0.90,'#5E2E10');g.addColorStop(1,'#361408');
  c.beginPath();c.arc(CX,CY,FR,0,Math.PI*2);c.fillStyle=g;c.fill();
}
function drawSlots(){
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2-Math.PI/2,gx=CX+Math.cos(a)*GemR,gy=CY+Math.sin(a)*GemR;
    const co=Math.cos(a),si=Math.sin(a),px=-si,py=co,l=GL+3,w=GW+3;
    c.beginPath();c.moveTo(gx+co*l,gy+si*l);c.lineTo(gx+px*w,gy+py*w);c.lineTo(gx-co*l,gy-si*l);c.lineTo(gx-px*w,gy-py*w);c.closePath();
    c.fillStyle='#0A0301';c.fill();c.strokeStyle='rgba(80,38,8,0.5)';c.lineWidth=0.6;c.stroke();
  }
}
function drawRings(){
  [ORg,IRg].forEach(r=>{
    c.beginPath();c.arc(CX,CY,r,0,Math.PI*2);c.strokeStyle='rgba(24,8,2,0.92)';c.lineWidth=1.5;c.stroke();
    c.beginPath();c.arc(CX,CY,r-1,Math.PI*0.87,Math.PI*1.76);c.strokeStyle='rgba(200,142,48,0.22)';c.lineWidth=0.5;c.stroke();
  });
}
function drawBand(){
  const N=60;
  for(let i=0;i<N;i++){
    const a1=i/N*Math.PI*2,a2=(i+0.5)/N*Math.PI*2,a3=(i+1)/N*Math.PI*2;
    const diff=Math.abs((((a2+Math.PI*0.75)+Math.PI*3)%(Math.PI*2))-Math.PI)/Math.PI,lit=1-diff;
    const rv=Math.round(82+lit*52),gv=Math.round(40+lit*26),bv=Math.round(8+lit*5);
    c.beginPath();c.moveTo(CX+Math.cos(a1)*BOr,CY+Math.sin(a1)*BOr);c.lineTo(CX+Math.cos(a2)*BIn,CY+Math.sin(a2)*BIn);c.lineTo(CX+Math.cos(a3)*BOr,CY+Math.sin(a3)*BOr);c.arc(CX,CY,BOr,a3,a1,true);
    c.fillStyle=`rgb(${rv},${gv},${bv})`;c.fill();
  }
}
function drawHorizon(){
  const by=CY+44;c.save();c.beginPath();c.arc(CX,CY,IRg-2,0,Math.PI*2);c.clip();
  c.beginPath();c.moveTo(CX-88,by);c.lineTo(CX+88,by);c.strokeStyle='rgba(55,22,4,0.32)';c.lineWidth=0.6;c.stroke();
  sag(CX-48,by,14,0.24);sag(CX+48,by,11,0.24);c.restore();
}
function sag(x,b,h,a){
  c.strokeStyle=`rgba(44,18,3,${a})`;c.lineWidth=1.6;c.lineCap='round';
  ln(x,b,x,b-h);const ay=b-h*0.46;ln(x,ay,x-h*0.3,ay);ln(x-h*0.3,ay,x-h*0.3,ay-h*0.26);ln(x,ay,x+h*0.3,ay);ln(x+h*0.3,ay,x+h*0.3,ay-h*0.26);
}
function ln(x1,y1,x2,y2){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();}

function drawEtch(al){
  if(al<=0)return;
  c.save();c.globalAlpha=al*0.95;
  c.font='600 17px monospace';c.fillStyle='rgba(210,158,58,0.88)';c.textBaseline='middle';c.textAlign='center';
  const chars='· DESERT FOX ·'.split('');
  const ar=IRg-10,ca=0.15,tot=chars.length*ca,sa=-Math.PI/2-tot/2;
  chars.forEach((ch,i)=>{const a=sa+i*ca;c.save();c.translate(CX+Math.cos(a)*ar,CY+Math.sin(a)*ar);c.rotate(a+Math.PI/2);c.fillText(ch,0,0);c.restore();});
  [Math.PI*1.5,Math.PI,0].forEach(a=>{c.beginPath();c.arc(CX+Math.cos(a)*(IRg-6),CY+Math.sin(a)*(IRg-6),1.8,0,Math.PI*2);c.fillStyle='rgba(180,128,44,0.6)';c.fill();});
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2+Math.PI/8;c.beginPath();c.moveTo(CX+Math.cos(a)*76,CY+Math.sin(a)*76);c.lineTo(CX+Math.cos(a)*(94+(i%2)*18),CY+Math.sin(a)*(94+(i%2)*18));c.strokeStyle='rgba(158,108,34,0.2)';c.lineWidth=0.5;c.stroke();}
  c.font='500 13px monospace';c.fillStyle='rgba(210,158,58,0.82)';c.textBaseline='middle';c.textAlign='center';
  const mchars='CUNNING FINDS THE WAY'.split('');
  const mr=IRg-10,mca=0.105,mtot=mchars.length*mca,msa=Math.PI/2+mtot/2;
  mchars.forEach((ch,i)=>{const a=msa-i*mca;c.save();c.translate(CX+Math.cos(a)*mr,CY+Math.sin(a)*mr);c.rotate(a-Math.PI/2);c.fillText(ch,0,0);c.restore();});
  c.restore();
}

function drawFox(fa){
  const os=1.23;
  function fpx(x){return CX+x*os;}
  function fpy(y){return CY-6+y*os;}
  const hp=[[0,-34],[8,-31],[24,-72],[33,-33],[46,-14],[48,8],[38,30],[20,48],[0,52],[-20,48],[-38,30],[-48,8],[-46,-14],[-33,-33],[-24,-72],[-8,-31]];
  const earL=[-24,-40,-25,-65,-15,-36],earR=[24,-40,25,-65,15,-36];
  const muzzle=[[-17,2],[17,2],[13,34],[0,42],[-13,34]];
  c.save();
  if(fa>0.05){
    c.globalAlpha=fa;
    c.beginPath();hp.forEach(([x,y],i)=>i?c.lineTo(fpx(x),fpy(y)):c.moveTo(fpx(x),fpy(y)));c.closePath();
    const headGr=c.createRadialGradient(fpx(0),fpy(-5),0,fpx(0),fpy(-5),55*os);
    headGr.addColorStop(0,'#E8A030');headGr.addColorStop(1,'#8A4A10');
    c.fillStyle=headGr;c.fill();
    [[earL],[earR]].forEach(([[x1,y1,x2,y2,x3,y3]])=>{c.beginPath();c.moveTo(fpx(x1),fpy(y1));c.lineTo(fpx(x2),fpy(y2));c.lineTo(fpx(x3),fpy(y3));c.closePath();c.fillStyle='#D88030';c.fill();});
    c.beginPath();muzzle.forEach(([x,y],i)=>i?c.lineTo(fpx(x),fpy(y)):c.moveTo(fpx(x),fpy(y)));c.closePath();c.fillStyle='#C87828';c.fill();
    [[-18,-13],[18,-13]].forEach(([ex,ey])=>{
      c.beginPath();c.moveTo(fpx(ex),fpy(ey-6));c.lineTo(fpx(ex+6),fpy(ey));c.lineTo(fpx(ex),fpy(ey+5));c.lineTo(fpx(ex-6),fpy(ey));c.closePath();c.fillStyle='#120503';c.fill();
      c.beginPath();c.arc(fpx(ex-1.5),fpy(ey-1.5),1.6,0,Math.PI*2);c.fillStyle='rgba(255,220,100,0.7)';c.fill();
    });
    c.beginPath();c.moveTo(fpx(-5),fpy(4));c.lineTo(fpx(5),fpy(4));c.lineTo(fpx(0),fpy(10));c.closePath();c.fillStyle='#120503';c.fill();
    c.beginPath();c.moveTo(fpx(0),fpy(10));c.lineTo(fpx(0),fpy(18));c.strokeStyle='rgba(18,5,3,0.5)';c.lineWidth=1.2;c.lineCap='round';c.stroke();
    if(fa>=0.95){
      const glow=c.createRadialGradient(CX,CY-6,0,CX,CY-6,80);
      glow.addColorStop(0,'rgba(240,165,0,0.12)');
      glow.addColorStop(1,'rgba(240,165,0,0)');
      c.beginPath();c.arc(CX,CY-6,80,0,Math.PI*2);c.fillStyle=glow;c.fill();
    }
  }
  const ghostStroke=fa<0.2;
  c.globalAlpha=fa<=0.07?fa*1.4:Math.min(fa*1.15,1);
  c.beginPath();hp.forEach(([x,y],i)=>i?c.lineTo(fpx(x),fpy(y)):c.moveTo(fpx(x),fpy(y)));c.closePath();
  c.strokeStyle=ghostStroke?'rgba(175,120,42,0.35)':'rgba(195,138,50,0.55)';c.lineWidth=ghostStroke?0.8:1.0;c.stroke();
  [[earL],[earR]].forEach(([[x1,y1,x2,y2,x3,y3]])=>{c.beginPath();c.moveTo(fpx(x1),fpy(y1));c.lineTo(fpx(x2),fpy(y2));c.lineTo(fpx(x3),fpy(y3));c.closePath();c.strokeStyle=ghostStroke?'rgba(158,105,36,0.25)':'rgba(185,125,44,0.44)';c.lineWidth=0.5;c.stroke();});
  c.restore();
}

function drawGems(){
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2-Math.PI/2,gx=CX+Math.cos(a)*GemR,gy=CY+Math.sin(a)*GemR;
    const filled=(i<st.g)||(i===st.fg&&st.ft>0.1);
    let sc=1;if(i===st.fg&&st.ft>0){const t=st.ft;sc=t<0.35?t/0.35*1.28:1+(1-t)*0.28;}
    c.save();c.translate(gx,gy);c.scale(sc,sc);c.translate(-gx,-gy);drawGem(gx,gy,a,filled);
    if(i===st.fg&&st.ft>0.05&&filled){const ga=Math.sin(st.ft*Math.PI)*0.55;const gr=c.createRadialGradient(gx,gy,0,gx,gy,28);gr.addColorStop(0,`rgba(255,195,40,${ga})`);gr.addColorStop(1,'rgba(255,172,0,0)');c.beginPath();c.arc(gx,gy,28,0,Math.PI*2);c.fillStyle=gr;c.fill();}
    c.restore();
  }
}
function drawGem(gx,gy,a,filled){
  const co=Math.cos(a),si=Math.sin(a),ppx=-si,ppy=co;
  c.beginPath();c.moveTo(gx+co*GL,gy+si*GL);c.lineTo(gx+ppx*GW,gy+ppy*GW);c.lineTo(gx-co*GL,gy-si*GL);c.lineTo(gx-ppx*GW,gy-ppy*GW);c.closePath();
  if(filled){
    const hx=gx-co*4-si*2.5,hy=gy-si*4+co*2.5;
    const gr=c.createRadialGradient(hx,hy,0.5,gx,gy,GL*1.4);
    gr.addColorStop(0,'#FFFEF0');gr.addColorStop(0.12,'#FFE878');gr.addColorStop(0.36,'#F0A500');gr.addColorStop(0.68,'#A06200');gr.addColorStop(1,'#4A2200');
    c.fillStyle=gr;c.fill();c.strokeStyle='rgba(252,215,65,0.75)';c.lineWidth=0.8;c.stroke();
    c.beginPath();c.moveTo(gx+co*GL*0.7,gy+si*GL*0.7);c.lineTo(gx+ppx*GW*0.32,gy+ppy*GW*0.32);c.strokeStyle='rgba(255,255,235,0.52)';c.lineWidth=0.5;c.stroke();
  }else{c.fillStyle='#0A0301';c.fill();c.strokeStyle='rgba(75,32,5,0.4)';c.lineWidth=0.6;c.stroke();}
}
function drawEdge(){
  c.beginPath();c.arc(CX,CY,CR,Math.PI*0.94,Math.PI*1.73);c.strokeStyle='rgba(232,195,92,0.42)';c.lineWidth=1.4;c.stroke();
  c.beginPath();c.arc(CX,CY,CR,-0.08,Math.PI*0.88);c.strokeStyle='rgba(5,2,0,0.65)';c.lineWidth=1.6;c.stroke();
}

// ─── Deterministic frame renderer for export ───
// Compresses the canonical medallion animation into 60 frames (2.5s @ 24fps):
//   frames  0– 5 (0.25s): rim wipes in clockwise from 12 o'clock
//   frames  6–11 (0.25s): face + inner structure fade up (reveals ghost fox)
//   frames 12–41 (1.25s): 6 gems place one at a time, 5 frames each
//   frames 42–59 (0.75s): fox emblem awakens, "DESERT FOX" etch fades in
//   frames 50–59 (0.42s): streak crown blooms in as final hurrah, ending at peak glow
window.renderFrameAt = function(n) {
  const RIM_END     = 6;
  const FACE_END    = 12;
  const GEMS_END    = 42;
  const STREAK_START = 50;   // overlaps tail of fox awakening
  const STREAK_STRUCT_FRAMES = 4;  // crown rays fade in 50–53
  const TOTAL       = 60;

  // Reset mutable animation state
  Object.assign(st, {g:0,done:false,streak:false,etch:0,foxA:0.09,sg:0,gl:0,fg:-1,ft:0,singIdx:-1,singT:0});

  // Clear the full canvas (in 520-based coords; scaled context covers 1080²)
  c.clearRect(0, 0, S, S);

  // Streak crown — final hurrah. Drawn first so rim/shadow layer over its
  // inner edge (matches original render() draw order). Visible only frames 50–59.
  if (n >= STREAK_START) {
    const sf = n - STREAK_START;             // 0–9
    let streakAlpha, streakGlow;
    if (sf < STREAK_STRUCT_FRAMES) {
      // Rays/ring sweep in
      streakAlpha = (sf + 1) / STREAK_STRUCT_FRAMES;
      streakGlow = 0;
    } else {
      // Structure complete; warm glow ramps to peak by final frame
      streakAlpha = 1;
      const glowFrames = TOTAL - STREAK_START - STREAK_STRUCT_FRAMES; // 6
      streakGlow = (sf - STREAK_STRUCT_FRAMES + 1) / glowFrames;
    }
    c.save();
    c.globalAlpha = streakAlpha;
    drawStreakCrown(streakGlow);
    c.restore();
  }

  // Phase 1: rim wipes in
  if (n < RIM_END) {
    const p = (n + 1) / RIM_END;
    c.save();
    c.beginPath();
    c.moveTo(CX, CY);
    c.arc(CX, CY, CR + 20, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * p);
    c.closePath();
    c.clip();
    drawShadow();
    drawRim();
    c.restore();
    return;
  }

  // Rim is fully drawn from here on
  drawShadow();
  drawRim();

  // Phase 2: face + inner structure fade in
  if (n < FACE_END) {
    const p = (n - RIM_END + 1) / (FACE_END - RIM_END);
    c.save();
    c.globalAlpha = p;
    drawFace();
    drawRings();
    drawBand();
    drawHorizon();
    drawSlots();
    drawFox(0.09);
    c.restore();
    drawEdge();
    return;
  }

  // Face + inner structure fully drawn from here on
  drawFace();
  drawRings();
  drawBand();
  drawHorizon();
  drawSlots();

  // Phase 3: 6 gems place one at a time (5 frames each)
  if (n < GEMS_END) {
    const gemFrame   = n - FACE_END;            // 0–29
    const currentGem = Math.floor(gemFrame / 5); // 0–5
    const localP     = (gemFrame % 5) / 4;       // 0–1 across this gem
    st.g  = currentGem;   // gems already fully placed
    st.fg = currentGem;   // the one currently placing
    st.ft = localP;
    drawFox(0.09);
    drawGems();
    drawEdge();
    return;
  }

  // Phase 4: fox awakens + etch appears (all 6 gems are set)
  const foxFrame = n - GEMS_END;                 // 0–17
  const foxP     = foxFrame / (TOTAL - 1 - GEMS_END); // 0–1
  const foxAlpha = 0.09 + foxP * 0.91;
  st.g = 6;
  st.fg = -1;
  st.ft = 0;
  drawFox(foxAlpha);
  drawEtch(foxP);
  drawGems();
  drawEdge();
};

// Signal readiness (Puppeteer polls for this)
window.__medallionReady = true;
</script>
</body>
</html>
